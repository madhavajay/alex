name: Beta Release

# Beta builds are cut from any commit by pushing a vX.Y.Z-beta.N tag.
# They build from source (never crates.io), publish a GitHub *prerelease*
# with manifest.json, and feed the beta update channels:
#   - CLI:  alex update --set-channel beta (resolves prereleases via API)
#   - App:  Preferences -> Updates -> Beta (Sparkle appcast-beta.xml)
# The stable channel is untouched: releases/latest never points at a
# prerelease, and appcast.xml is not modified here.

on:
  push:
    tags:
      - "v*-beta.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing beta tag (vX.Y.Z-beta.N)"
        required: true

permissions:
  contents: write

concurrency:
  group: beta-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: namespace-profile-linux-medium
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Validate tag
        id: meta
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "tag '$tag' is not a beta tag (expected vX.Y.Z-beta.N)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  test:
    needs: meta
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  swift-test:
    needs: meta
    runs-on: namespace-profile-mac-medium
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Test Swift app
        working-directory: macos
        run: swift test

  create-prerelease:
    needs: [meta, test]
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "prerelease $tag already exists"
          else
            gh release create "$tag" \
              --prerelease \
              --latest=false \
              --verify-tag \
              --title "Alex $tag (beta)" \
              --notes "Beta build ${{ needs.meta.outputs.version }}. Pre-release test version — install via the beta update channel."
          fi

  linux-asset:
    needs: [meta, create-prerelease]
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and package x86_64 and aarch64 GNU CLIs
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          ./scripts/stamp-version.sh "$version"
          cargo build --release -p alex --bins
          docker run --rm -v "$PWD":/io -w /io ghcr.io/rust-cross/cargo-zigbuild:latest bash -c '
            set -euo pipefail
            rustup target add aarch64-unknown-linux-gnu
            cargo zigbuild -p alex --bin alex --release --target aarch64-unknown-linux-gnu
            file target/aarch64-unknown-linux-gnu/release/alex | grep -Eq "ARM aarch64|aarch64"
            file target/aarch64-unknown-linux-gnu/release/alex | grep -q "dynamically linked"
          '
          mkdir -p dist
          x86_asset="alex-cli-${version}-linux-x86_64.tar.gz"
          arm_asset="alex-cli-${version}-linux-aarch64.tar.gz"
          tar -C target/release -czf "dist/$x86_asset" alex
          tar -C target/aarch64-unknown-linux-gnu/release -czf "dist/$arm_asset" alex
          file target/release/alex | grep -Eq "x86-64|x86_64"
          file target/release/alex | grep -q "dynamically linked"
          shasum -a 256 "dist/$x86_asset" > "dist/$x86_asset.sha256"
          shasum -a 256 "dist/$arm_asset" > "dist/$arm_asset.sha256"
      - name: Upload to prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.meta.outputs.tag }}" dist/* --clobber

  linux-musl-asset:
    needs: [meta, create-prerelease]
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Build fully static musl binaries (x86_64 + aarch64) + checksums
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          ./scripts/stamp-version.sh "$version"
          # Static musl (no glibc floor, no dynamic OpenSSL) so the CLI runs in
          # any Linux container. TLS is rustls, so nothing links libssl.
          docker run --rm -v "$PWD":/io -w /io ghcr.io/rust-cross/cargo-zigbuild:latest bash -c '
            set -euo pipefail
            rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
            cargo zigbuild -p alex --bin alex --release \
              --target x86_64-unknown-linux-musl \
              --target aarch64-unknown-linux-musl
            mkdir -p dist
            cp target/x86_64-unknown-linux-musl/release/alex  dist/alex-x86_64-unknown-linux-musl
            cp target/aarch64-unknown-linux-musl/release/alex dist/alex-aarch64-unknown-linux-musl
            file dist/alex-x86_64-unknown-linux-musl  | grep -q "statically linked"
            file dist/alex-aarch64-unknown-linux-musl | grep -q "statically linked"
            tar -C target/x86_64-unknown-linux-musl/release -czf "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz" alex
            tar -C target/aarch64-unknown-linux-musl/release -czf "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-aarch64-musl.tar.gz" alex
            sha256sum "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz" > "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz.sha256"
            sha256sum "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-aarch64-musl.tar.gz" > "dist/alex-cli-${{ needs.meta.outputs.version }}-linux-aarch64-musl.tar.gz.sha256"
            ( cd dist && sha256sum alex-x86_64-unknown-linux-musl alex-aarch64-unknown-linux-musl > checksums.txt )
            chmod -R a+rX dist
          '
          cat dist/checksums.txt
      - name: Upload to prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" \
            dist/alex-x86_64-unknown-linux-musl \
            dist/alex-aarch64-unknown-linux-musl \
            dist/alex-cli-${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz \
            dist/alex-cli-${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz.sha256 \
            dist/alex-cli-${{ needs.meta.outputs.version }}-linux-aarch64-musl.tar.gz \
            dist/alex-cli-${{ needs.meta.outputs.version }}-linux-aarch64-musl.tar.gz.sha256 \
            dist/checksums.txt --clobber

  macos-cli-asset:
    needs: [meta, create-prerelease, swift-test]
    runs-on: namespace-profile-mac-medium
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI binaries
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          ./scripts/stamp-version.sh "$version"
          cargo build --release -p alex --bins
          cargo build --release -p alex --bins --target x86_64-apple-darwin

      - name: Check CLI signing secrets
        id: cli_signing
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            SIGNING_CERTIFICATE_P12_DATA \
            SIGNING_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            if [[ "${{ github.event_name }}" == "push" ]]; then
              # A tag release must never publish unsigned macOS CLI archives.
              printf 'Missing required macOS CLI signing secret(s): %s\n' "${missing[*]}" >&2
              exit 1
            fi
            printf 'Skipping macOS CLI codesign for workflow_dispatch; missing secret(s): %s\n' "${missing[*]}"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up CLI signing keychain
        if: steps.cli_signing.outputs.available == 'true'
        id: signing_keychain
        uses: ./.github/actions/mac-signing-keychain
        with:
          apple_signing_identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
          signing_certificate_p12_data: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          signing_certificate_password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}

      - name: Prepare CLI signing payloads
        run: |
          set -euo pipefail
          arm_root="$RUNNER_TEMP/alex-cli-release-aarch64"
          intel_root="$RUNNER_TEMP/alex-cli-release-x86_64"
          rm -rf "$arm_root" "$intel_root"
          mkdir -p "$arm_root" "$intel_root"
          cp target/release/alex "$arm_root/"
          cp target/x86_64-apple-darwin/release/alex "$intel_root/"

      - name: Sign CLI binaries
        if: steps.cli_signing.outputs.available == 'true'
        env:
          CODESIGN_IDENTITY: ${{ steps.signing_keychain.outputs.identity }}
        run: |
          set -euo pipefail
          for bin in \
            "$RUNNER_TEMP/alex-cli-release-aarch64/alex" \
            "$RUNNER_TEMP/alex-cli-release-x86_64/alex"
          do
            codesign --remove-signature "$bin" 2>/dev/null || true
            codesign --force --options runtime --timestamp \
              --identifier "com.madhavajay.alex.cli" \
              --sign "$CODESIGN_IDENTITY" "$bin"
            codesign --verify --strict --verbose=2 "$bin"
          done

      - name: Notarize CLI binaries
        if: steps.cli_signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          notary_root="$RUNNER_TEMP/alex-cli-notary"
          notary_zip="$RUNNER_TEMP/alex-cli-notary.zip"
          notary_result="$RUNNER_TEMP/alex-cli-notary-result.json"
          rm -rf "$notary_root" "$notary_zip" "$notary_result"
          mkdir -p "$notary_root/aarch64" "$notary_root/x86_64"
          cp "$RUNNER_TEMP/alex-cli-release-aarch64/alex" "$notary_root/aarch64/"
          cp "$RUNNER_TEMP/alex-cli-release-x86_64/alex" "$notary_root/x86_64/"
          ditto -c -k --sequesterRsrc "$notary_root" "$notary_zip"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > "$notary_result"
          verdict="$(plutil -extract status raw -o - "$notary_result")"
          if [[ "$verdict" != "Accepted" ]]; then
            submission_id="$(plutil -extract id raw -o - "$notary_result")"
            xcrun notarytool log "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            echo "CLI notarization failed with status: $verdict" >&2
            exit 1
          fi

      - name: Package CLI binaries
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          mkdir -p dist
          arm_asset="alex-cli-${version}-macos-aarch64.tar.gz"
          intel_asset="alex-cli-${version}-macos-x86_64.tar.gz"
          tar -C "$RUNNER_TEMP/alex-cli-release-aarch64" -czf "dist/$arm_asset" alex
          tar -C "$RUNNER_TEMP/alex-cli-release-x86_64" -czf "dist/$intel_asset" alex

          verify_root="$RUNNER_TEMP/alex-cli-archive-verify"
          rm -rf "$verify_root"
          mkdir -p "$verify_root/aarch64" "$verify_root/x86_64"
          tar -xzf "dist/$arm_asset" -C "$verify_root/aarch64"
          tar -xzf "dist/$intel_asset" -C "$verify_root/x86_64"
          for bin in \
            "$verify_root/aarch64/alex" \
            "$verify_root/x86_64/alex"
          do
            codesign --verify --strict --verbose=2 "$bin"
          done

          shasum -a 256 "dist/$arm_asset" > "dist/$arm_asset.sha256"
          shasum -a 256 "dist/$intel_asset" > "dist/$intel_asset.sha256"

      - name: Clean up CLI signing keychain
        if: always() && steps.cli_signing.outputs.available == 'true'
        uses: ./.github/actions/mac-signing-keychain
        with:
          cleanup: "true"
          keychain: ${{ steps.signing_keychain.outputs.keychain }}
          original_default_keychain: ${{ steps.signing_keychain.outputs.original_default_keychain }}

      - name: Upload to prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.meta.outputs.tag }}" dist/* --clobber

  macos-cli-verify:
    needs: [meta, macos-cli-asset]
    if: ${{ !cancelled() && needs.macos-cli-asset.result == 'success' }}
    runs-on: namespace-profile-mac-medium
    permissions:
      contents: read
    steps:
      - name: Download and independently verify packaged CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          tag="${{ needs.meta.outputs.tag }}"
          asset="alex-cli-${version}-macos-aarch64.tar.gz"
          root="$RUNNER_TEMP/alex-cli-independent-verify"
          rm -rf "$root"
          mkdir -p "$root/extracted"
          gh release download "$tag" --repo "${{ github.repository }}" \
            --dir "$root" --pattern "$asset" --pattern "$asset.sha256"
          sed 's#dist/##' "$root/$asset.sha256" | (cd "$root" && shasum -a 256 -c -)
          tar -xzf "$root/$asset" -C "$root/extracted"
          bin="$root/extracted/alex"
          codesign --verify --strict --verbose=2 "$bin"
          details="$(codesign --display --verbose=4 "$bin" 2>&1)"
          grep -q '^Authority=Developer ID Application:' <<< "$details"
          grep -Eq '^TeamIdentifier=[A-Z0-9]{10}$' <<< "$details"
          grep -Eq '^CodeDirectory .*flags=.*runtime' <<< "$details"
          grep -Fxq 'Identifier=com.madhavajay.alex.cli' <<< "$details"
          "$bin" --version

  manifest:
    needs: [meta, linux-asset, linux-musl-asset, macos-cli-asset, macos-cli-verify]
    if: ${{ !cancelled() && needs.linux-asset.result == 'success' && needs.linux-musl-asset.result == 'success' && needs.macos-cli-asset.result == 'success' && needs.macos-cli-verify.result == 'success' }}
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Generate and upload manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          rm -rf dist/manifest-assets
          mkdir -p dist/manifest-assets
          gh release download "$tag" --dir dist/manifest-assets --clobber
          find dist/manifest-assets -type f -name '*.sha256' -delete
          python3 scripts/gen-manifest.py \
            --tag "$tag" \
            --repo "${{ github.repository }}" \
            --assets-dir dist/manifest-assets \
            --out manifest.json
          cat manifest.json
          gh release upload "$tag" manifest.json --clobber

  beta-app:
    needs: [meta, manifest, swift-test]
    if: ${{ !cancelled() && needs.manifest.result == 'success' && needs.swift-test.result == 'success' }}
    permissions:
      contents: write
    uses: ./.github/workflows/dmg-appcast.yml
    with:
      channel: beta
      tag: ${{ needs.meta.outputs.tag }}
      overwrite: true
      hard_fail_missing_secrets: ${{ github.event_name == 'push' }}
      require_existing_manifest: true
    secrets: inherit
