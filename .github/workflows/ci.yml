name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lar-scale:
    name: LAR deterministic scale gate
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: lar-scale
      - name: Run bounded CI scale profile
        run: |
          cargo run --release --locked -p alex-lar-scale -- run \
            --profile ci \
            --root "$RUNNER_TEMP/alex-lar-ci" \
            --output "$RUNNER_TEMP/alex-lar-ci-result.json"
      - name: Generate and verify sanitized Fable to Sol fixture
        run: |
          cargo run --release --locked -p alex-lar-scale -- fixture-fable-sol \
            --vector crates/alex-proxy/tests/fixtures/middleware/fable-to-sol-vector.json \
            --failure crates/alex-proxy/tests/fixtures/middleware/anthropic-fable-refusal-200.json \
            --output "$RUNNER_TEMP/fable-to-sol.lar" \
            --report "$RUNNER_TEMP/fable-to-sol-result.json"
      - uses: actions/upload-artifact@v4
        with:
          name: lar-scale-results
          path: |
            ${{ runner.temp }}/alex-lar-ci-result.json
            ${{ runner.temp }}/fable-to-sol-result.json
            ${{ runner.temp }}/fable-to-sol.lar
          if-no-files-found: error
          retention-days: 14

  linux-installed-smoke:
    name: Linux ${{ matrix.arch }} installed release smoke
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-installed-smoke-${{ matrix.arch }}

      - name: Enable ARM64 container emulation
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Assert clean Ubuntu x86-64 runner
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == "Linux" ]]
          [[ "$(uname -m)" == "x86_64" ]]
          . /etc/os-release
          [[ "$ID" == "ubuntu" ]]
          docker info >/dev/null

      - name: Build release-format candidate archives and checksums
        id: package
        run: |
          set -euo pipefail
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          arch="${{ matrix.arch }}"
          asset_dir="$GITHUB_WORKSPACE/dist/ci-linux-$arch/assets"
          asset="alex-cli-${version}-linux-${arch}.tar.gz"

          rm -rf "$GITHUB_WORKSPACE/dist/ci-linux-$arch"
          mkdir -p "$asset_dir"
          if [[ "$arch" == "x86_64" ]]; then
            cargo build --release --locked -p alex --bins
            binary_dir="target/release"
            docker run --rm -v "$PWD":/io -w /io ghcr.io/rust-cross/cargo-zigbuild:latest bash -c '
              set -euo pipefail
              rustup target add x86_64-unknown-linux-musl
              cargo zigbuild --locked -p alex --bin alex --release \
                --target x86_64-unknown-linux-musl
              file target/x86_64-unknown-linux-musl/release/alex | grep -q "statically linked"
            '
            musl_binary_dir="target/x86_64-unknown-linux-musl/release"
          else
            docker run --rm -v "$PWD":/io -w /io ghcr.io/rust-cross/cargo-zigbuild:latest bash -c '
              set -euo pipefail
              rustup target add aarch64-unknown-linux-gnu aarch64-unknown-linux-musl
              cargo zigbuild --locked -p alex --bin alex --release \
                --target aarch64-unknown-linux-gnu \
                --target aarch64-unknown-linux-musl
              file target/aarch64-unknown-linux-gnu/release/alex | grep -Eq "ARM aarch64|aarch64"
              file target/aarch64-unknown-linux-gnu/release/alex | grep -q "dynamically linked"
              file target/aarch64-unknown-linux-musl/release/alex | grep -q "statically linked"
            '
            binary_dir="target/aarch64-unknown-linux-gnu/release"
            musl_binary_dir="target/aarch64-unknown-linux-musl/release"
          fi
          musl_asset="alex-cli-${version}-linux-${arch}-musl.tar.gz"
          tar -C "$musl_binary_dir" -czf "$asset_dir/$musl_asset" alex
          shasum -a 256 "$asset_dir/$musl_asset" > "$asset_dir/$musl_asset.sha256"
          tar -C "$binary_dir" -czf "$asset_dir/$asset" alex
          shasum -a 256 "$asset_dir/$asset" > "$asset_dir/$asset.sha256"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Smoke GNU installer, routing, trace persistence, and systemd restart
        env:
          ALEX_CI_LINUX_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-linux-${{ matrix.arch }}/installed-gnu-smoke.json
          ALEX_CI_LINUX_VERSION: ${{ steps.package.outputs.version }}
          ALEX_CI_LINUX_ARCH: ${{ matrix.arch }}
          ALEX_CI_LINUX_LIBC: gnu
          ALEX_CI_LINUX_ASSET_DIR: ${{ github.workspace }}/dist/ci-linux-${{ matrix.arch }}/assets
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-smoke-${{ matrix.arch }}-gnu-${{ github.run_id }}-${{ github.run_attempt }}
        run: packaging/ci-linux/run-systemd-container.sh

      - name: Smoke musl installer, routing, trace persistence, and systemd restart
        env:
          ALEX_CI_LINUX_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-linux-${{ matrix.arch }}/installed-musl-smoke.json
          ALEX_CI_LINUX_VERSION: ${{ steps.package.outputs.version }}
          ALEX_CI_LINUX_ARCH: ${{ matrix.arch }}
          ALEX_CI_LINUX_LIBC: musl
          ALEX_CI_LINUX_ASSET_DIR: ${{ github.workspace }}/dist/ci-linux-${{ matrix.arch }}/assets
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-smoke-${{ matrix.arch }}-musl-${{ github.run_id }}-${{ github.run_attempt }}
        run: packaging/ci-linux/run-systemd-container.sh

      - name: Clean installed smoke container
        if: always()
        run: |
          set +e
          for libc in gnu musl; do
            name="alex-linux-smoke-${{ matrix.arch }}-${libc}-${{ github.run_id }}-${{ github.run_attempt }}"
            docker rm --force "$name" >/dev/null 2>&1
            if docker container inspect "$name" >/dev/null 2>&1; then
              echo "container cleanup failed: $name" >&2
              exit 1
            fi
          done

      - name: Upload Linux candidate and smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-installed-smoke
          path: dist/ci-linux-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 14

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-linux-medium, namespace-profile-mac-medium]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify complete release manifest contract
        if: runner.os == 'Linux'
        run: |
          python3 scripts/test-release-manifest.py
          bash scripts/test-linux-installers.sh
      - run: cargo build --workspace
      - name: Deterministic shared-web platform smoke
        run: cargo test -p alex-proxy deterministic_platform_smoke -- --nocapture
      - name: Platform browser-launch contract
        run: cargo test -p alex browser_launch_commands_are_platform_specific -- --nocapture
      - name: Platform path and service lifecycle contract
        run: cargo test -p alex platform_path_and_service_lifecycle_contracts -- --nocapture
      - run: cargo test --workspace
      - run: cargo package -p alex-core

  mock-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-linux-medium, namespace-profile-mac-medium]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mock-matrix
      - name: Credential-free mock tier (daemon + fakeprov)
        run: ./test.sh mock
      - name: Fakeprov router integration
        run: cargo test -p alex-proxy --test fakeprov_router -- --nocapture
      - name: Fakeprov crate suite
        run: cargo test -p alex-fakeprov

  harness-mock:
    # Real harness CLIs in Docker -> real daemon -> fakeprov. Sharded by
    # harness so each runner pulls exactly one harness image; lifecycle
    # (C*) cells and that harness's matrix cells stay on the same shard.
    strategy:
      fail-fast: false
      matrix:
        harness: [claude, codex, grok-build, kimi]
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: harness-mock
      - name: Assert Docker available
        run: docker info >/dev/null
      - name: Offline harness matrix (${{ matrix.harness }})
        run: ./test.sh harness-mock --harness ${{ matrix.harness }} --json | tee harness-mock-${{ matrix.harness }}.json
      - name: Upload cell report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-mock-${{ matrix.harness }}
          path: harness-mock-${{ matrix.harness }}.json
          if-no-files-found: ignore
          retention-days: 14

  harness-versions:
    # Advisory drift check: reports when harness npm releases move past the
    # pinned catalog versions. The weekly bump-and-test flow runs the write
    # mode; see the header of scripts/bump-harness-versions.sh.
    runs-on: namespace-profile-linux-medium
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Harness version drift
        run: scripts/bump-harness-versions.sh --check || echo "::warning::harness versions outdated"

  mock-windows:
    # Windows is not a stable-release gate yet; this job surfaces platform
    # quirks in the new offline test stack without blocking the pipeline.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mock-windows
      - name: Fakeprov crate suite
        run: cargo test -p alex-fakeprov
      - name: Core parser and override suites
        run: cargo test -p alex-core -p alex-auth -p alex-store
      - name: Fakeprov router integration
        run: cargo test -p alex-proxy --test fakeprov_router -- --nocapture

  webui:
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: webui
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build daemon and fakeprov
        run: cargo build -p alex -p alex-fakeprov
      - name: Install Playwright
        working-directory: webui-tests
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Web UI suite against mock stack
        working-directory: webui-tests
        run: pnpm test

  swift:
    runs-on: namespace-profile-mac-medium
    steps:
      - uses: actions/checkout@v4
      - name: Build Alex
        working-directory: macos
        run: swift build
      - name: Test Alex
        working-directory: macos
        run: swift test

  macos-pr-artifact:
    name: macOS PR test bundle
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-mac-medium
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-pr-artifact

      - name: Build release daemon and CLI
        run: cargo build --release --locked -p alex --bins

      - name: Build ad-hoc Alex app
        run: |
          set -euo pipefail
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          CONFIGURATION=release \
            IDENTITY=- \
            BUNDLE_ID=com.madhavajay.alex \
            VERSION="$version" \
            ./macos/Scripts/package_app.sh
          codesign --verify --deep --strict macos/dist/Alex.app

      - name: Assemble test bundle
        id: bundle
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:12}"
          bundle_name="alex-macos-pr-${PR_NUMBER}-${short_sha}"
          stage="$RUNNER_TEMP/$bundle_name"
          output="$GITHUB_WORKSPACE/dist/ci-macos"

          rm -rf "$stage" "$output"
          mkdir -p "$stage/bin" "$output"
          ditto macos/dist/Alex.app "$stage/Alex.app"
          cp target/release/alex "$stage/bin/"
          cp \
            packaging/ci-macos/install.sh \
            packaging/ci-macos/mock-openai.py \
            packaging/ci-macos/smoke-installed.sh \
            packaging/ci-macos/README.md \
            "$stage/"
          cp scripts/lib/install-common.sh "$stage/"
          chmod +x \
            "$stage/install.sh" \
            "$stage/mock-openai.py" \
            "$stage/smoke-installed.sh" \
            "$stage/bin/alex"

          {
            echo "Alex macOS PR test bundle"
            echo "pull_request=${PR_NUMBER}"
            echo "commit=${GITHUB_SHA}"
            echo "runner_arch=$(uname -m)"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "app_bundle_id=$(defaults read "$stage/Alex.app/Contents/Info" CFBundleIdentifier)"
            echo "app_version=$(defaults read "$stage/Alex.app/Contents/Info" CFBundleShortVersionString)"
          } > "$stage/BUILD_INFO.txt"

          tar -C "$RUNNER_TEMP" -czf "$output/$bundle_name.tar.gz" "$bundle_name"
          shasum -a 256 "$output/$bundle_name.tar.gz" > "$output/$bundle_name.tar.gz.sha256"
          printf 'Extract %s, then run ./%s/install.sh\n' \
            "$bundle_name.tar.gz" "$bundle_name" > "$output/HOW_TO_INSTALL.txt"
          echo "artifact_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Smoke packaged install, routing, trace persistence, and launchd restart
        env:
          BUNDLE_NAME: ${{ steps.bundle.outputs.artifact_name }}
          ALEX_CI_SMOKE_ROOT: ${{ runner.temp }}/alex-installed-smoke
          ALEX_CI_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-macos/installed-smoke.json
        run: |
          set -euo pipefail
          extract_root="$RUNNER_TEMP/alex-installed-smoke-package"
          rm -rf "$extract_root"
          mkdir -p "$extract_root"
          tar -C "$extract_root" -xzf "dist/ci-macos/$BUNDLE_NAME.tar.gz"
          "$extract_root/$BUNDLE_NAME/smoke-installed.sh"

      - name: Clean installed smoke service and files
        if: always()
        env:
          ALEX_CI_SMOKE_ROOT: ${{ runner.temp }}/alex-installed-smoke
        run: |
          set +e
          service_target="gui/$(id -u)/com.madhavajay.alex.daemon"
          alex_bin="$ALEX_CI_SMOKE_ROOT/bin/alex"
          if [[ -f "$ALEX_CI_SMOKE_ROOT/service-cleanup-allowed" ]]; then
            if [[ -x "$alex_bin" ]]; then
              ALEX_HOME="$ALEX_CI_SMOKE_ROOT/state" \
                "$alex_bin" service uninstall >/dev/null 2>&1
            fi
            launchctl bootout "$service_target" >/dev/null 2>&1
            rm -f "$HOME/Library/LaunchAgents/com.madhavajay.alex.daemon.plist"
            rm -f /tmp/alex.daemon.out.log /tmp/alex.daemon.err.log
          fi
          if [[ -s "$ALEX_CI_SMOKE_ROOT/mock.pid" ]]; then
            mock_pid="$(tr -d '[:space:]' < "$ALEX_CI_SMOKE_ROOT/mock.pid")"
            if [[ "$mock_pid" =~ ^[0-9]+$ ]]; then
              kill "$mock_pid" >/dev/null 2>&1
            fi
          fi
          rm -rf \
            "$ALEX_CI_SMOKE_ROOT" \
            "$RUNNER_TEMP/alex-installed-smoke-package"
          if launchctl print "$service_target" >/dev/null 2>&1; then
            echo "launchd cleanup failed: $service_target is still loaded" >&2
            exit 1
          fi

      - name: Upload macOS test bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: dist/ci-macos/
          if-no-files-found: error
          retention-days: 14
