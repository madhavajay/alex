name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lar-scale:
    name: LAR deterministic scale gate
    runs-on: namespace-profile-linux-medium
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: lar-scale
      - name: Run bounded CI scale profile
        run: |
          cargo run --release --locked -p alex-lar-scale -- run \
            --profile ci \
            --root "$RUNNER_TEMP/alex-lar-ci" \
            --output "$RUNNER_TEMP/alex-lar-ci-result.json"
      - name: Generate and verify sanitized Fable to Sol fixture
        run: |
          cargo run --release --locked -p alex-lar-scale -- fixture-fable-sol \
            --vector crates/alex-proxy/tests/fixtures/middleware/fable-to-sol-vector.json \
            --failure crates/alex-proxy/tests/fixtures/middleware/anthropic-fable-refusal-200.json \
            --output "$RUNNER_TEMP/fable-to-sol.lar" \
            --report "$RUNNER_TEMP/fable-to-sol-result.json"
      - uses: actions/upload-artifact@v4
        with:
          name: lar-scale-results
          path: |
            ${{ runner.temp }}/alex-lar-ci-result.json
            ${{ runner.temp }}/fable-to-sol-result.json
            ${{ runner.temp }}/fable-to-sol.lar
          if-no-files-found: error
          retention-days: 14

  linux-installed-smoke:
    name: Linux x86-64 installed release smoke
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-installed-smoke

      - name: Assert clean Ubuntu x86-64 runner
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == "Linux" ]]
          [[ "$(uname -m)" == "x86_64" ]]
          . /etc/os-release
          [[ "$ID" == "ubuntu" ]]
          docker info >/dev/null

      - name: Build release-format candidate archive and checksum
        id: package
        run: |
          set -euo pipefail
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          asset_dir="$GITHUB_WORKSPACE/dist/ci-linux/assets"
          asset="alex-cli-${version}-linux-x86_64.tar.gz"

          rm -rf "$GITHUB_WORKSPACE/dist/ci-linux"
          mkdir -p "$asset_dir"
          cargo build --release --locked -p alex --bins
          tar -C target/release -czf "$asset_dir/$asset" alex
          shasum -a 256 "$asset_dir/$asset" > "$asset_dir/$asset.sha256"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Smoke public installer, routing, trace persistence, and systemd restart
        env:
          ALEX_CI_LINUX_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-linux/installed-smoke.json
          ALEX_CI_LINUX_VERSION: ${{ steps.package.outputs.version }}
          ALEX_CI_LINUX_ASSET_DIR: ${{ github.workspace }}/dist/ci-linux/assets
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: packaging/ci-linux/run-systemd-container.sh

      - name: Clean installed smoke container
        if: always()
        env:
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set +e
          docker rm --force "$ALEX_CI_LINUX_CONTAINER_NAME" >/dev/null 2>&1
          if docker container inspect "$ALEX_CI_LINUX_CONTAINER_NAME" >/dev/null 2>&1; then
            echo "container cleanup failed: $ALEX_CI_LINUX_CONTAINER_NAME" >&2
            exit 1
          fi

      - name: Upload Linux candidate and smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86-64-installed-smoke
          path: dist/ci-linux/
          if-no-files-found: error
          retention-days: 14

  linux-upgrade-rollback-smoke:
    name: Linux packaged upgrade and rollback smoke
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-upgrade-rollback-smoke

      - name: Assert isolated build and smoke prerequisites
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == "Linux" ]]
          [[ "$(uname -m)" == "x86_64" ]]
          . /etc/os-release
          [[ "$ID" == "ubuntu" ]]
          docker info >/dev/null
          git cat-file -e "${{ github.event.pull_request.base.sha }}^{commit}"

      - name: Build local base A and candidate B release packages
        id: package
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          candidate_version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          candidate_sha="$(git rev-parse HEAD)"
          [[ "$BASE_SHA" != "$candidate_sha" ]] || {
            echo "upgrade base and candidate commits must differ" >&2
            exit 1
          }

          if [[ "$candidate_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            base_version="${candidate_version}-beta.0"
          elif [[ "$candidate_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-beta\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            beta="${BASH_REMATCH[4]}"
            if ((beta > 0)); then
              base_version="$major.$minor.$patch-beta.$((beta - 1))"
            elif ((patch > 0)); then
              base_version="$major.$minor.$((patch - 1))"
            elif ((minor > 0)); then
              base_version="$major.$((minor - 1)).0"
            elif ((major > 0)); then
              base_version="$((major - 1)).0.0"
            else
              echo "cannot derive a lower version from $candidate_version" >&2
              exit 1
            fi
          else
            echo "unsupported candidate version: $candidate_version" >&2
            exit 1
          fi

          root="$GITHUB_WORKSPACE/dist/ci-linux-upgrade"
          assets="$root/assets"
          base_source="$RUNNER_TEMP/alex-upgrade-base-source"
          base_target="$RUNNER_TEMP/alex-upgrade-base-target"
          rm -rf "$root" "$base_source" "$base_target"
          mkdir -p "$assets" "$base_source"

          cargo build --release --locked -p alex --bins
          candidate_asset="alex-cli-${candidate_version}-linux-x86_64.tar.gz"
          tar -C target/release -czf "$assets/$candidate_asset" alex
          shasum -a 256 "$assets/$candidate_asset" > "$assets/$candidate_asset.sha256"
          [[ "$(target/release/alex --version)" == "alex $candidate_version" ]]

          git archive "$BASE_SHA" | tar -x -C "$base_source"
          (
            cd "$base_source"
            ./scripts/stamp-version.sh "$base_version"
            CARGO_TARGET_DIR="$base_target" cargo build --release --locked -p alex --bins
          )
          base_asset="alex-cli-${base_version}-linux-x86_64.tar.gz"
          tar -C "$base_target/release" -czf "$assets/$base_asset" alex
          shasum -a 256 "$assets/$base_asset" > "$assets/$base_asset.sha256"
          reported="$("$base_target/release/alex" --version)"
          [[ "$reported" == "alex $base_version" ]] || {
            echo "base alex reported unexpected version: $reported" >&2
            exit 1
          }

          {
            echo "base_version=$base_version"
            echo "candidate_version=$candidate_version"
            echo "base_sha=$BASE_SHA"
            echo "candidate_sha=$candidate_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Install A, upgrade to B, and explicitly roll back to A
        id: smoke
        env:
          ALEX_CI_LINUX_SMOKE_MODE: upgrade-rollback
          ALEX_CI_LINUX_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-linux-upgrade/upgrade-rollback.json
          ALEX_CI_LINUX_BASE_VERSION: ${{ steps.package.outputs.base_version }}
          ALEX_CI_LINUX_VERSION: ${{ steps.package.outputs.candidate_version }}
          ALEX_CI_LINUX_BASE_SHA: ${{ steps.package.outputs.base_sha }}
          ALEX_CI_LINUX_CANDIDATE_SHA: ${{ steps.package.outputs.candidate_sha }}
          ALEX_CI_LINUX_ASSET_DIR: ${{ github.workspace }}/dist/ci-linux-upgrade/assets
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-upgrade-${{ github.run_id }}-${{ github.run_attempt }}
        run: packaging/ci-linux/run-systemd-container.sh

      - name: Clean upgrade/rollback smoke container
        if: always()
        env:
          ALEX_CI_LINUX_CONTAINER_NAME: alex-linux-upgrade-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set +e
          docker rm --force "$ALEX_CI_LINUX_CONTAINER_NAME" >/dev/null 2>&1
          if docker container inspect "$ALEX_CI_LINUX_CONTAINER_NAME" >/dev/null 2>&1; then
            echo "container cleanup failed: $ALEX_CI_LINUX_CONTAINER_NAME" >&2
            exit 1
          fi

      - name: Upload upgrade/rollback evidence only
        if: steps.smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86-64-upgrade-rollback-evidence
          path: dist/ci-linux-upgrade/upgrade-rollback.json
          if-no-files-found: error
          retention-days: 14

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-linux-medium, namespace-profile-mac-medium]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - name: Deterministic shared-web platform smoke
        run: cargo test -p alex-proxy deterministic_platform_smoke -- --nocapture
      - name: Platform browser-launch contract
        run: cargo test -p alex browser_launch_commands_are_platform_specific -- --nocapture
      - name: Platform path and service lifecycle contract
        run: cargo test -p alex platform_path_and_service_lifecycle_contracts -- --nocapture
      - run: cargo test --workspace
      - run: cargo package -p alex-core

  swift:
    runs-on: namespace-profile-mac-medium
    steps:
      - uses: actions/checkout@v4
      - name: Build Alex
        working-directory: macos
        run: swift build
      - name: Test Alex
        working-directory: macos
        run: swift test

  macos-pr-artifact:
    name: macOS PR test bundle
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-mac-medium
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-pr-artifact

      - name: Build release daemon and CLI
        run: cargo build --release --locked -p alex --bins

      - name: Build ad-hoc Alex app
        run: |
          set -euo pipefail
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          CONFIGURATION=release \
            IDENTITY=- \
            BUNDLE_ID=com.madhavajay.alex \
            VERSION="$version" \
            ./macos/Scripts/package_app.sh
          codesign --verify --deep --strict macos/dist/Alex.app

      - name: Assemble test bundle
        id: bundle
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:12}"
          bundle_name="alex-macos-pr-${PR_NUMBER}-${short_sha}"
          stage="$RUNNER_TEMP/$bundle_name"
          output="$GITHUB_WORKSPACE/dist/ci-macos"

          rm -rf "$stage" "$output"
          mkdir -p "$stage/bin" "$output"
          ditto macos/dist/Alex.app "$stage/Alex.app"
          cp target/release/alex "$stage/bin/"
          cp \
            packaging/ci-macos/install.sh \
            packaging/ci-macos/mock-openai.py \
            packaging/ci-macos/smoke-installed.sh \
            packaging/ci-macos/README.md \
            "$stage/"
          cp scripts/lib/install-common.sh "$stage/"
          chmod +x \
            "$stage/install.sh" \
            "$stage/mock-openai.py" \
            "$stage/smoke-installed.sh" \
            "$stage/bin/alex"

          {
            echo "Alex macOS PR test bundle"
            echo "pull_request=${PR_NUMBER}"
            echo "commit=${GITHUB_SHA}"
            echo "runner_arch=$(uname -m)"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "app_bundle_id=$(defaults read "$stage/Alex.app/Contents/Info" CFBundleIdentifier)"
            echo "app_version=$(defaults read "$stage/Alex.app/Contents/Info" CFBundleShortVersionString)"
          } > "$stage/BUILD_INFO.txt"

          tar -C "$RUNNER_TEMP" -czf "$output/$bundle_name.tar.gz" "$bundle_name"
          shasum -a 256 "$output/$bundle_name.tar.gz" > "$output/$bundle_name.tar.gz.sha256"
          printf 'Extract %s, then run ./%s/install.sh\n' \
            "$bundle_name.tar.gz" "$bundle_name" > "$output/HOW_TO_INSTALL.txt"
          echo "artifact_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Smoke packaged install, routing, trace persistence, and launchd restart
        env:
          BUNDLE_NAME: ${{ steps.bundle.outputs.artifact_name }}
          ALEX_CI_SMOKE_ROOT: ${{ runner.temp }}/alex-installed-smoke
          ALEX_CI_SMOKE_RESULT: ${{ github.workspace }}/dist/ci-macos/installed-smoke.json
        run: |
          set -euo pipefail
          extract_root="$RUNNER_TEMP/alex-installed-smoke-package"
          rm -rf "$extract_root"
          mkdir -p "$extract_root"
          tar -C "$extract_root" -xzf "dist/ci-macos/$BUNDLE_NAME.tar.gz"
          "$extract_root/$BUNDLE_NAME/smoke-installed.sh"

      - name: Clean installed smoke service and files
        if: always()
        env:
          ALEX_CI_SMOKE_ROOT: ${{ runner.temp }}/alex-installed-smoke
        run: |
          set +e
          service_target="gui/$(id -u)/com.madhavajay.alex.daemon"
          alex_bin="$ALEX_CI_SMOKE_ROOT/bin/alex"
          if [[ -f "$ALEX_CI_SMOKE_ROOT/service-cleanup-allowed" ]]; then
            if [[ -x "$alex_bin" ]]; then
              ALEX_HOME="$ALEX_CI_SMOKE_ROOT/state" \
                "$alex_bin" service uninstall >/dev/null 2>&1
            fi
            launchctl bootout "$service_target" >/dev/null 2>&1
            rm -f "$HOME/Library/LaunchAgents/com.madhavajay.alex.daemon.plist"
            rm -f /tmp/alex.daemon.out.log /tmp/alex.daemon.err.log
          fi
          if [[ -s "$ALEX_CI_SMOKE_ROOT/mock.pid" ]]; then
            mock_pid="$(tr -d '[:space:]' < "$ALEX_CI_SMOKE_ROOT/mock.pid")"
            if [[ "$mock_pid" =~ ^[0-9]+$ ]]; then
              kill "$mock_pid" >/dev/null 2>&1
            fi
          fi
          rm -rf \
            "$ALEX_CI_SMOKE_ROOT" \
            "$RUNNER_TEMP/alex-installed-smoke-package"
          if launchctl print "$service_target" >/dev/null 2>&1; then
            echo "launchd cleanup failed: $service_target is still loaded" >&2
            exit 1
          fi

      - name: Upload macOS test bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: dist/ci-macos/
          if-no-files-found: error
          retention-days: 14
