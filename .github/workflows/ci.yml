name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked
      - name: Verify core package
        if: matrix.os == 'ubuntu-latest'
        run: cargo package -p alex-core --locked

  swift:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build AlexandriaBar
        working-directory: macos
        run: swift build
      - name: Test AlexandriaBar
        working-directory: macos
        run: swift test
      - name: Package AlexandriaBar
        run: |
          chmod +x macos/Scripts/package_app.sh scripts/smoke-packaged-app.sh
          CONFIGURATION=release IDENTITY=- ./macos/Scripts/package_app.sh
      - name: Smoke test packaged app
        run: ./scripts/smoke-packaged-app.sh macos/dist/AlexandriaBar.app
