name: Release to crates.io

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing stable tag (vX.Y.Z)"
        required: true
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  meta:
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-beta.') }}
    runs-on: namespace-profile-linux-medium
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Validate stable tag
        id: meta
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag '$tag' is not a stable tag (expected vX.Y.Z)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: meta
    runs-on: namespace-profile-linux-medium
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.meta.result == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.meta.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Stamp version from tag
        id: version
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          ./scripts/stamp-version.sh "$version"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - run: cargo test --workspace

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          for crate in alex-core alex-auth alex-store alex-proxy alex-wrap alex; do
            echo "::group::publish ${crate} ${version}"
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -A "alex-release-workflow" \
              "https://crates.io/api/v1/crates/${crate}/${version}")
            if [ "$status" = "200" ]; then
              echo "${crate} ${version} already published; skipping"
            else
              cargo publish -p "$crate" --allow-dirty
            fi
            echo "::endgroup::"
          done

      - name: Build CLI binary from crates.io
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          root="$RUNNER_TEMP/alex-cli-install"
          artifact_dir="$PWD/dist/release-assets"
          asset="alex-cli-${version}-linux-x86_64.tar.gz"

          rm -rf "$root" "$artifact_dir"
          mkdir -p "$artifact_dir"

          for attempt in {1..12}; do
            if cargo install alex --version "$version" --root "$root" --force --bins; then
              break
            fi

            if [[ "$attempt" -eq 12 ]]; then
              echo "cargo install alex ${version} failed after ${attempt} attempts" >&2
              exit 1
            fi

            echo "alex ${version} is not installable from crates.io yet; retrying in 15s..."
            sleep 15
          done

          tar -C "$root/bin" -czf "$artifact_dir/$asset" alex alexandria
          shasum -a 256 "$artifact_dir/$asset" > "$artifact_dir/$asset.sha256"

      - name: Publish CLI binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          asset_dir="dist/release-assets"
          notes="Release assets for Alexandria ${version}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset_dir"/* --clobber
          else
            if ! gh release create "$tag" "$asset_dir"/* \
              --target "$(git rev-parse HEAD)" \
              --title "Alexandria ${tag}" \
              --notes "$notes"; then
              gh release upload "$tag" "$asset_dir"/* --clobber
            fi
          fi

  windows-asset:
    needs: [meta, publish]
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.publish.result == 'success' }}
    runs-on: namespace-profile-windows-medium
    permissions:
      contents: write
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Build CLI binaries from crates.io
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          root="$RUNNER_TEMP/alex-cli-install"
          asset="alex-cli-${version}-windows-x86_64.zip"

          for attempt in {1..12}; do
            if cargo install alex --version "$version" --root "$root" --force --bins; then
              break
            fi
            if [[ "$attempt" -eq 12 ]]; then
              echo "cargo install alex ${version} failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "alex ${version} is not installable from crates.io yet; retrying in 15s..."
            sleep 15
          done

          mkdir -p dist
          7z a "dist/$asset" "$root/bin/alex.exe" "$root/bin/alexandria.exe"
          sha256sum "dist/$asset" > "dist/$asset.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "v${{ needs.publish.outputs.version }}" dist/* --clobber -R "${{ github.repository }}"

  linux-musl-asset:
    needs: [meta, publish]
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.publish.result == 'success' }}
    runs-on: namespace-profile-linux-medium
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Build fully static musl binaries (x86_64 + aarch64) + checksums
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          ./scripts/stamp-version.sh "$version"
          # Static musl (no glibc floor, no dynamic OpenSSL) so the CLI runs in
          # any Linux container. TLS is rustls, so nothing links libssl.
          docker run --rm -v "$PWD":/io -w /io ghcr.io/rust-cross/cargo-zigbuild:latest bash -c '
            set -euo pipefail
            rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
            cargo zigbuild -p alex --bin alex --release \
              --target x86_64-unknown-linux-musl \
              --target aarch64-unknown-linux-musl
            mkdir -p dist
            cp target/x86_64-unknown-linux-musl/release/alex  dist/alex-x86_64-unknown-linux-musl
            cp target/aarch64-unknown-linux-musl/release/alex dist/alex-aarch64-unknown-linux-musl
            file dist/alex-x86_64-unknown-linux-musl  | grep -q "statically linked"
            file dist/alex-aarch64-unknown-linux-musl | grep -q "statically linked"
            ( cd dist && sha256sum alex-x86_64-unknown-linux-musl alex-aarch64-unknown-linux-musl > checksums.txt )
            chmod -R a+rX dist
          '
          cat dist/checksums.txt
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${{ needs.publish.outputs.version }}" \
            dist/alex-x86_64-unknown-linux-musl \
            dist/alex-aarch64-unknown-linux-musl \
            dist/checksums.txt --clobber -R "${{ github.repository }}"

  macos-asset:
    needs: [meta, publish]
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.publish.result == 'success' }}
    runs-on: namespace-profile-mac-medium
    permissions:
      contents: write
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
      SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build CLI binaries from crates.io
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          arm_root="$RUNNER_TEMP/alex-cli-aarch64"
          intel_root="$RUNNER_TEMP/alex-cli-x86_64"
          rm -rf "$arm_root" "$intel_root"

          install_with_retry() {
            local root="$1"
            shift
            for attempt in {1..12}; do
              if cargo install alex --version "$version" --root "$root" --force --bins "$@"; then
                return 0
              fi
              if [[ "$attempt" -eq 12 ]]; then
                echo "cargo install alex ${version} failed after ${attempt} attempts" >&2
                return 1
              fi
              echo "alex ${version} is not installable from crates.io yet; retrying in 15s..."
              sleep 15
            done
          }

          install_with_retry "$arm_root"
          rustup target add x86_64-apple-darwin
          install_with_retry "$intel_root" --target x86_64-apple-darwin

      - name: Check CLI signing secrets
        id: cli_signing
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPLE_SIGNING_IDENTITY \
            SIGNING_CERTIFICATE_P12_DATA \
            SIGNING_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Skipping macOS CLI codesign; missing secret(s): %s\n' "${missing[*]}"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign CLI binaries
        if: steps.cli_signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          keychain_password="$(uuidgen)"
          keychain="$RUNNER_TEMP/alex-cli-signing.keychain-db"
          p12="$RUNNER_TEMP/alex-cli-signing.p12"
          original_default_keychain="$(security default-keychain | tr -d '"')"

          cleanup() {
            security default-keychain -s "$original_default_keychain" >/dev/null 2>&1 || true
            security delete-keychain "$keychain" >/dev/null 2>&1 || true
            rm -f "$p12"
          }
          trap cleanup EXIT

          if ! printf '%s' "$SIGNING_CERTIFICATE_P12_DATA" | base64 --decode > "$p12" 2>/dev/null; then
            printf '%s' "$SIGNING_CERTIFICATE_P12_DATA" | base64 -D > "$p12"
          fi

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security default-keychain -s "$keychain"
          existing_keychains="$(security list-keychains -d user | tr -d '"')"
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$keychain" $existing_keychains
          security import "$p12" -k "$keychain" \
            -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain" >/dev/null 2>&1 || true

          identity_list="$(security find-identity -p codesigning -v "$keychain" || true)"
          codesign_identity=""
          if [[ "${APPLE_SIGNING_IDENTITY:-}" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            codesign_identity="$APPLE_SIGNING_IDENTITY"
          elif [[ -n "${APPLE_TEAM_ID:-}" ]]; then
            codesign_identity="$(awk -v team="(${APPLE_TEAM_ID})" '/Developer ID Application/ && index($0, team) { print $2; exit }' <<<"$identity_list")"
          fi
          if [[ -z "$codesign_identity" ]]; then
            codesign_identity="$(awk '/Developer ID Application/ { print $2; exit }' <<<"$identity_list")"
          fi
          if [[ -z "$codesign_identity" ]]; then
            echo "no Developer ID Application identity found after import:" >&2
            printf '%s\n' "$identity_list" >&2
            exit 1
          fi

          for bin in \
            "$RUNNER_TEMP/alex-cli-aarch64/bin/alex" \
            "$RUNNER_TEMP/alex-cli-aarch64/bin/alexandria" \
            "$RUNNER_TEMP/alex-cli-x86_64/bin/alex" \
            "$RUNNER_TEMP/alex-cli-x86_64/bin/alexandria"
          do
            codesign --force --options runtime --timestamp --sign "$codesign_identity" "$bin"
            codesign --verify --strict --verbose=2 "$bin"
          done

      - name: Package CLI binaries
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          artifact_dir="$PWD/dist/release-assets"
          mkdir -p "$artifact_dir"

          arm_asset="alex-cli-${version}-macos-aarch64.tar.gz"
          intel_asset="alex-cli-${version}-macos-x86_64.tar.gz"

          tar -C "$RUNNER_TEMP/alex-cli-aarch64/bin" -czf "$artifact_dir/$arm_asset" alex alexandria
          tar -C "$RUNNER_TEMP/alex-cli-x86_64/bin" -czf "$artifact_dir/$intel_asset" alex alexandria
          shasum -a 256 "$artifact_dir/$arm_asset" > "$artifact_dir/$arm_asset.sha256"
          shasum -a 256 "$artifact_dir/$intel_asset" > "$artifact_dir/$intel_asset.sha256"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "v${{ needs.publish.outputs.version }}" dist/release-assets/* --clobber -R "${{ github.repository }}"

  manifest:
    needs:
      - meta
      - publish
      - windows-asset
      - macos-asset
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.publish.result == 'success' && needs.macos-asset.result == 'success' }}
    runs-on: namespace-profile-linux-medium
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Set manifest metadata
        id: version
        run: echo "version=${{ needs.publish.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          tag="v${version}"
          rm -rf dist/manifest-assets
          mkdir -p dist/manifest-assets
          gh release download "$tag" --dir dist/manifest-assets --clobber -R "${{ github.repository }}"
          find dist/manifest-assets -type f -name '*.sha256' -delete

      - name: Generate manifest
        run: |
          set -euo pipefail
          version="${{ needs.publish.outputs.version }}"
          tag="v${version}"
          merge_args=()
          if [[ -f dist/manifest-assets/manifest.json ]]; then
            merge_args=(--merge-existing dist/manifest-assets/manifest.json)
          fi
          python3 scripts/gen-manifest.py \
            --tag "$tag" \
            --repo "${{ github.repository }}" \
            --assets-dir dist/manifest-assets \
            "${merge_args[@]}" \
            --out manifest.json
          cat manifest.json

      - name: Upload manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "v${{ needs.publish.outputs.version }}" manifest.json --clobber -R "${{ github.repository }}"

  stable-app:
    needs: [meta, manifest]
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.manifest.result == 'success' }}
    runs-on: namespace-profile-mac-medium
    timeout-minutes: 40
    permissions:
      contents: write
    env:
      BUNDLE_ID: com.madhavajay.alex
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
      SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Check app signing secrets
        id: app_signing
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_SIGNING_IDENTITY \
            SIGNING_CERTIFICATE_P12_DATA \
            SIGNING_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Skipping stable DMG; missing secret(s): %s\n' "${missing[*]}"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed DMG
        if: steps.app_signing.outputs.available == 'true'
        env:
          SPARKLE_FEED_URL: https://madhavajay.github.io/alex/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          ./scripts/stamp-version.sh "${{ needs.meta.outputs.version }}"
          chmod +x build-signed.sh check-gatekeeper.sh install-dmg.sh macos/Scripts/package_app.sh
          ./build-signed.sh --clean --notarize
          ./check-gatekeeper.sh macos/dist/*.dmg

      - name: Upload DMG and refresh manifest
        if: steps.app_signing.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          dmg="$(ls -t macos/dist/*.dmg | head -1)"
          gh release upload "$tag" "$dmg" --clobber

          rm -rf dist/app-manifest-assets
          mkdir -p dist/app-manifest-assets
          gh release download "$tag" --pattern manifest.json --dir dist/app-manifest-assets --clobber
          cp "$dmg" dist/app-manifest-assets/
          python3 scripts/gen-manifest.py \
            --tag "$tag" \
            --repo "${{ github.repository }}" \
            --assets-dir dist/app-manifest-assets \
            --merge-existing dist/app-manifest-assets/manifest.json \
            --out manifest.json
          cat manifest.json
          gh release upload "$tag" manifest.json --clobber

      - name: Check Sparkle signing key
        id: sparkle_key
        if: steps.app_signing.outputs.available == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "Skipping stable appcast; SPARKLE_ED_PRIVATE_KEY is not configured."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate stable appcast
        if: steps.app_signing.outputs.available == 'true' && steps.sparkle_key.outputs.present == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          rm -rf sparkle updates appcast.xml
          mkdir -p sparkle updates
          curl -fsSL \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz \
            -o sparkle.tar.xz
          tar -xJf sparkle.tar.xz -C sparkle
          generate_appcast="$(find sparkle -path '*/bin/generate_appcast' -type f | head -1)"
          if [[ -z "$generate_appcast" ]]; then
            echo "Unable to locate generate_appcast in Sparkle 2.9.4 archive." >&2
            exit 1
          fi
          chmod +x "$generate_appcast"
          cp macos/dist/*.dmg updates/
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/madhavajay/alex/releases/download/${tag}/" \
            -o appcast.xml \
            updates/

      - name: Publish stable appcast to GitHub Pages
        if: steps.app_signing.outputs.available == 'true' && steps.sparkle_key.outputs.present == 'true'
        run: |
          set -euo pipefail
          mkdir -p site
          cp appcast.xml site/appcast.xml

      - name: Deploy GitHub Pages
        if: steps.app_signing.outputs.available == 'true' && steps.sparkle_key.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true

  tap-formula:
    needs: manifest
    if: ${{ !cancelled() && !contains(github.event.inputs.tag || github.ref_name, '-beta.') && needs.manifest.result == 'success' }}
    runs-on: namespace-profile-linux-medium
    env:
      TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tap deploy key
        id: tap_key
        run: |
          set -euo pipefail
          if [[ -z "${TAP_DEPLOY_KEY:-}" ]]; then
            echo "Skipping Homebrew formula update; TAP_DEPLOY_KEY is not configured."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download manifest
        if: steps.tap_key.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.manifest.outputs.version }}"
          gh release download "v${version}" --pattern manifest.json --clobber -R "${{ github.repository }}"

      - name: Render formula
        if: steps.tap_key.outputs.present == 'true'
        run: |
          set -euo pipefail
          version="${{ needs.manifest.outputs.version }}"
          sha_mac_arm="$(python3 -c 'import json; print(json.load(open("manifest.json"))["components"]["cli"]["platforms"]["aarch64-apple-darwin"]["sha256"])')"
          sha_mac_intel="$(python3 -c 'import json; print(json.load(open("manifest.json"))["components"]["cli"]["platforms"]["x86_64-apple-darwin"]["sha256"])')"
          sha_linux="$(python3 -c 'import json; print(json.load(open("manifest.json"))["components"]["cli"]["platforms"]["x86_64-unknown-linux-gnu"]["sha256"])')"

          mkdir -p dist/homebrew
          sed \
            -e "s/{{VERSION}}/${version}/g" \
            -e "s/{{SHA_MAC_ARM}}/${sha_mac_arm}/g" \
            -e "s/{{SHA_MAC_INTEL}}/${sha_mac_intel}/g" \
            -e "s/{{SHA_LINUX}}/${sha_linux}/g" \
            packaging/homebrew/alex.rb.tmpl > dist/homebrew/alex.rb

      - name: Push formula to Homebrew tap
        if: steps.tap_key.outputs.present == 'true'
        run: |
          set -euo pipefail
          version="${{ needs.manifest.outputs.version }}"
          key_file="$RUNNER_TEMP/homebrew-alex-deploy-key"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$key_file"
          chmod 600 "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new"

          git clone git@github.com:madhavajay/homebrew-alex.git "$RUNNER_TEMP/homebrew-alex"
          cd "$RUNNER_TEMP/homebrew-alex"
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B main
          fi
          mkdir -p Formula
          cp "$GITHUB_WORKSPACE/dist/homebrew/alex.rb" Formula/alex.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/alex.rb
          if git diff --cached --quiet; then
            echo "Formula/alex.rb is already up to date; skipping commit."
          else
            git commit -m "alex ${version}"
            git push origin HEAD:main
          fi
