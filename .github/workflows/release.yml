name: Release to crates.io

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'release:')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo test --workspace

      - name: Bump version if current one is already published
        id: version
        run: |
          set -euo pipefail
          current=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "alex-release-workflow" \
            "https://crates.io/api/v1/crates/alex/${current}")
          if [ "$status" = "200" ]; then
            IFS=. read -r major minor patch <<<"$current"
            next="${major}.${minor}.$((patch + 1))"
            echo "bumping ${current} -> ${next}"
            sed -i "s/^version = \"${current}\"/version = \"${next}\"/" Cargo.toml
            sed -i "s/version = \"${current}\" }/version = \"${next}\" }/" Cargo.toml
            cargo update --workspace
            version="$next"
            bumped=1
          else
            echo "version ${current} not on crates.io yet; publishing as-is"
            version="$current"
            bumped=0
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "bumped=${bumped}" >> "$GITHUB_OUTPUT"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          for crate in alex-core alex-auth alex-store alex-proxy alex; do
            echo "::group::publish ${crate} ${version}"
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -A "alex-release-workflow" \
              "https://crates.io/api/v1/crates/${crate}/${version}")
            if [ "$status" = "200" ]; then
              echo "${crate} ${version} already published; skipping"
            else
              cargo publish -p "$crate" --allow-dirty
            fi
            echo "::endgroup::"
          done

      - name: Commit bump and tag
        if: steps.version.outputs.bumped == '1'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${version}"
          git tag "v${version}"
          git push origin HEAD:main "v${version}"

      - name: Tag initial release
        if: steps.version.outputs.bumped == '0'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${version}"
          git push origin "v${version}" || true

      - name: Build CLI binary from crates.io
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          root="$RUNNER_TEMP/alex-cli-install"
          artifact_dir="$PWD/dist/release-assets"
          asset="alex-cli-${version}-linux-x86_64.tar.gz"

          rm -rf "$root" "$artifact_dir"
          mkdir -p "$artifact_dir"

          for attempt in {1..12}; do
            if cargo install alex --version "$version" --root "$root" --force --bins; then
              break
            fi

            if [[ "$attempt" -eq 12 ]]; then
              echo "cargo install alex ${version} failed after ${attempt} attempts" >&2
              exit 1
            fi

            echo "alex ${version} is not installable from crates.io yet; retrying in 15s..."
            sleep 15
          done

          tar -C "$root/bin" -czf "$artifact_dir/$asset" alex alexandria
          shasum -a 256 "$artifact_dir/$asset" > "$artifact_dir/$asset.sha256"

      - name: Publish CLI binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          asset_dir="dist/release-assets"
          notes="Release assets for Alexandria ${version}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset_dir"/* --clobber
          else
            if ! gh release create "$tag" "$asset_dir"/* \
              --target "$(git rev-parse HEAD)" \
              --title "Alexandria ${tag}" \
              --notes "$notes"; then
              gh release upload "$tag" "$asset_dir"/* --clobber
            fi
          fi
