name: Secret Scan

# Block secrets from ever being merged: scan every push and PR with gitleaks,
# which knows both the built-in provider patterns and Alex's own key formats
# (see .gitleaks.toml). A finding fails the job, so a PR carrying a secret can't
# be merged once this is a required check.
on:
  push:
    branches: ["**"]
    tags: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so pushes/PRs are scanned across their whole range,
          # not just the tip commit.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE: the action is free for public repos.
