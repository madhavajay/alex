name: Build Signed macOS App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing stable tag to build (vX.Y.Z)"
        required: true
        type: string
      notarize:
        description: "Submit the DMG to Apple notarization"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Attach the notarized DMG to a GitHub Release"
        required: true
        default: true
        type: boolean
      overwrite:
        description: "Overwrite existing release assets"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-signed-macos:
    name: Build signed DMG
    runs-on: namespace-profile-mac-medium
    timeout-minutes: 30
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    env:
      BUNDLE_ID: com.madhavajay.alex

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate release tag
        id: meta
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Stable update channels must only be generated from an exact stable tag.
            echo "tag '$RELEASE_TAG' is not a stable tag (expected vX.Y.Z)" >&2
            exit 1
          fi
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          if [[ "$RELEASE_TAG" != "v${version}" ]]; then
            # Refuse to publish a tag whose embedded package version disagrees.
            echo "tag '$RELEASE_TAG' does not match Cargo.toml version '$version'" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$(git rev-list -n 1 "$RELEASE_TAG")" ]]; then
            # Refuse to publish if checkout did not resolve to the requested tag.
            echo "checked-out commit does not match tag '$RELEASE_TAG'" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate signing secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_SIGNING_IDENTITY \
            SIGNING_CERTIFICATE_P12_DATA \
            SIGNING_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Build signed DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SPARKLE_FEED_URL: https://madhavajay.github.io/alex/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          chmod +x build-signed.sh check-gatekeeper.sh install-dmg.sh macos/Scripts/package_app.sh
          if [[ "${{ inputs.notarize }}" == "true" ]]; then
            ./build-signed.sh --clean --notarize
          else
            ./build-signed.sh --clean --skip-notarize
          fi

      - name: Check Gatekeeper
        if: ${{ inputs.notarize }}
        run: ./check-gatekeeper.sh macos/dist/*.dmg

      - name: Prepare release metadata
        id: release
        if: ${{ inputs.notarize && inputs.publish_release }}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          tag="${{ steps.meta.outputs.tag }}"
          dmg="$(ls -t macos/dist/*.dmg | head -1)"

          if [[ -z "$version" || -z "$dmg" ]]; then
            echo "Unable to resolve release version or DMG path." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "dmg=$dmg"
          } >> "$GITHUB_OUTPUT"

      - name: Publish DMG to GitHub Release
        if: ${{ inputs.notarize && inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          DMG_PATH: ${{ steps.release.outputs.dmg }}
        run: |
          set -euo pipefail
          upload_args=()
          if [[ "${{ inputs.overwrite }}" == "true" ]]; then
            upload_args+=(--clobber)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" "${upload_args[@]}"
          else
            if ! gh release create "$RELEASE_TAG" "$DMG_PATH" \
              --target "$(git rev-parse HEAD)" \
              --title "Alexandria ${RELEASE_TAG}" \
              --notes "Release assets for Alexandria ${RELEASE_VERSION}."; then
              gh release upload "$RELEASE_TAG" "$DMG_PATH" "${upload_args[@]}"
            fi
          fi

      - name: Check Sparkle signing key
        id: sparkle_key
        if: ${{ inputs.notarize && inputs.publish_release }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            # A published DMG must update the signed appcast so app users see it.
            echo "SPARKLE_ED_PRIVATE_KEY is required when publishing a release." >&2
            exit 1
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Sparkle appcast
        if: ${{ inputs.notarize && inputs.publish_release && steps.sparkle_key.outputs.present == 'true' }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DMG_PATH: ${{ steps.release.outputs.dmg }}
        run: |
          set -euo pipefail
          rm -rf sparkle updates appcast.xml
          mkdir -p sparkle updates
          curl -fsSL \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz \
            -o sparkle.tar.xz
          tar -xJf sparkle.tar.xz -C sparkle
          generate_appcast="$(find sparkle -path '*/bin/generate_appcast' -type f | head -1)"
          if [[ -z "$generate_appcast" ]]; then
            echo "Unable to locate generate_appcast in Sparkle 2.9.4 archive." >&2
            exit 1
          fi
          chmod +x "$generate_appcast"
          cp "$DMG_PATH" updates/
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/madhavajay/alex/releases/download/${RELEASE_TAG}/" \
            -o appcast.xml \
            updates/

      - name: Publish appcast to GitHub Pages
        if: ${{ inputs.notarize && inputs.publish_release && steps.sparkle_key.outputs.present == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p site
          cp appcast.xml site/appcast.xml

      - name: Deploy GitHub Pages
        if: ${{ inputs.notarize && inputs.publish_release && steps.sparkle_key.outputs.present == 'true' }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true

      - name: Update release manifest
        if: ${{ inputs.notarize && inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DMG_PATH: ${{ steps.release.outputs.dmg }}
        run: |
          set -euo pipefail
          rm -rf dist/app-manifest-assets
          mkdir -p dist/app-manifest-assets
          if ! gh release download "$RELEASE_TAG" \
            --pattern manifest.json \
            --dir dist/app-manifest-assets \
            --clobber; then
            echo "No existing manifest.json found on ${RELEASE_TAG}; creating app-only manifest."
          fi
          cp "$DMG_PATH" dist/app-manifest-assets/

          merge_args=()
          if [[ -f dist/app-manifest-assets/manifest.json ]]; then
            merge_args=(--merge-existing dist/app-manifest-assets/manifest.json)
          fi
          python3 scripts/gen-manifest.py \
            --tag "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --assets-dir dist/app-manifest-assets \
            "${merge_args[@]}" \
            --out manifest.json
          cat manifest.json
          upload_args=()
          if [[ "${{ inputs.overwrite }}" == "true" ]]; then
            upload_args+=(--clobber)
          fi
          gh release upload "$RELEASE_TAG" manifest.json "${upload_args[@]}"

      - name: Check tap deploy key
        id: tap_key
        if: ${{ inputs.notarize && inputs.publish_release }}
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [[ -z "${TAP_DEPLOY_KEY:-}" ]]; then
            # A published DMG must update the tap instead of silently omitting its cask.
            echo "TAP_DEPLOY_KEY is required when publishing a release." >&2
            exit 1
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Render cask
        if: ${{ inputs.notarize && inputs.publish_release && steps.tap_key.outputs.present == 'true' }}
        env:
          DMG_PATH: ${{ steps.release.outputs.dmg }}
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          sha_dmg="$(shasum -a 256 "$DMG_PATH" | awk '{ print $1 }')"
          mkdir -p dist/homebrew
          sed \
            -e "s/{{VERSION}}/${version}/g" \
            -e "s/{{SHA_DMG}}/${sha_dmg}/g" \
            packaging/homebrew/alexandria.rb.tmpl > dist/homebrew/alexandria.rb

      - name: Push cask to Homebrew tap
        if: ${{ inputs.notarize && inputs.publish_release && steps.tap_key.outputs.present == 'true' }}
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          key_file="$RUNNER_TEMP/homebrew-alex-deploy-key"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$key_file"
          chmod 600 "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new"

          git clone git@github.com:madhavajay/homebrew-alex.git "$RUNNER_TEMP/homebrew-alex"
          cd "$RUNNER_TEMP/homebrew-alex"
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B main
          fi
          mkdir -p Casks
          cp "$GITHUB_WORKSPACE/dist/homebrew/alexandria.rb" Casks/alexandria.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/alexandria.rb
          if git diff --cached --quiet; then
            echo "Casks/alexandria.rb is already up to date; skipping commit."
          else
            git commit -m "alexandria ${version}"
            git push origin HEAD:main
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: alexandria-macos-dmg
          path: macos/dist/*.dmg
