name: Build Signed macOS App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing stable tag to build (vX.Y.Z)"
        required: true
        type: string
      notarize:
        description: "Submit the DMG to Apple notarization"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Attach the notarized DMG to a GitHub Release"
        required: true
        default: true
        type: boolean
      overwrite:
        description: "Overwrite existing release assets"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  meta:
    name: Validate release tag
    runs-on: namespace-profile-mac-medium
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate release tag
        id: meta
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Stable update channels must only be generated from an exact stable tag.
            echo "tag '$RELEASE_TAG' is not a stable tag (expected vX.Y.Z)" >&2
            exit 1
          fi
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          if [[ "$RELEASE_TAG" != "v${version}" ]]; then
            # Refuse to publish a tag whose embedded package version disagrees.
            echo "tag '$RELEASE_TAG' does not match Cargo.toml version '$version'" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$(git rev-list -n 1 "$RELEASE_TAG")" ]]; then
            # Refuse to publish if checkout did not resolve to the requested tag.
            echo "checked-out commit does not match tag '$RELEASE_TAG'" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

  dmg_appcast:
    needs: meta
    permissions:
      contents: write
    uses: ./.github/workflows/dmg-appcast.yml
    with:
      channel: stable
      tag: ${{ needs.meta.outputs.tag }}
      overwrite: ${{ inputs.overwrite }}
      notarize: ${{ inputs.notarize }}
      publish_release: ${{ inputs.publish_release }}
      hard_fail_missing_secrets: true
      require_existing_manifest: false
    secrets: inherit

  tap-cask:
    name: Publish Homebrew cask
    needs: [meta, dmg_appcast]
    if: ${{ !cancelled() && needs.dmg_appcast.result == 'success' && inputs.notarize && inputs.publish_release }}
    runs-on: namespace-profile-mac-medium
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.dmg_appcast.outputs.artifact_name }}
          path: macos/dist

      - name: Check tap deploy key
        id: tap_key
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_DEPLOY_KEY:-}" ]]; then
            # A published DMG must update the tap instead of silently omitting its cask.
            echo "TAP_DEPLOY_KEY is required when publishing a release." >&2
            exit 1
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Render cask
        if: steps.tap_key.outputs.present == 'true'
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          dmg="$(ls -t macos/dist/*.dmg | head -1)"
          sha_dmg="$(shasum -a 256 "$dmg" | awk '{ print $1 }')"
          mkdir -p dist/homebrew
          sed \
            -e "s/{{VERSION}}/${version}/g" \
            -e "s/{{SHA_DMG}}/${sha_dmg}/g" \
            packaging/homebrew/alexandria.rb.tmpl > dist/homebrew/alexandria.rb

      - name: Push cask to Homebrew tap
        if: steps.tap_key.outputs.present == 'true'
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          key_file="$RUNNER_TEMP/homebrew-alex-deploy-key"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$key_file"
          chmod 600 "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new"

          git clone git@github.com:madhavajay/homebrew-alex.git "$RUNNER_TEMP/homebrew-alex"
          cd "$RUNNER_TEMP/homebrew-alex"
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B main
          fi
          mkdir -p Casks
          cp "$GITHUB_WORKSPACE/dist/homebrew/alexandria.rb" Casks/alexandria.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/alexandria.rb
          if git diff --cached --quiet; then
            echo "Casks/alexandria.rb is already up to date; skipping commit."
          else
            git commit -m "alexandria ${version}"
            git push origin HEAD:main
          fi
