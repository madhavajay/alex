name: Build Signed macOS App

on:
  workflow_dispatch:
    inputs:
      notarize:
        description: "Submit the DMG to Apple notarization"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build-signed-macos:
    name: Build signed DMG
    runs-on: macos-15
    timeout-minutes: 30
    env:
      BUNDLE_ID: com.madhavajay.alexandria-macos
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
      SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate signing secrets
        run: |
          missing=()
          for key in \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_SIGNING_IDENTITY \
            SIGNING_CERTIFICATE_P12_DATA \
            SIGNING_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Build signed DMG
        run: |
          chmod +x build-signed.sh check-gatekeeper.sh install-dmg.sh macos/Scripts/package_app.sh
          if [[ "${{ inputs.notarize }}" == "true" ]]; then
            ./build-signed.sh --clean --notarize
          else
            ./build-signed.sh --clean --skip-notarize
          fi

      - name: Check Gatekeeper
        if: ${{ inputs.notarize }}
        run: ./check-gatekeeper.sh macos/dist/*.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: alexandria-macos-dmg
          path: macos/dist/*.dmg
