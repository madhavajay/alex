name: Public site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install locked dependencies
        working-directory: site
        run: npm ci --ignore-scripts
      - name: Test public site
        working-directory: site
        run: npm test
      - name: Build public site
        working-directory: site
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: alex-public-site-${{ github.sha }}
          path: site/dist/
          if-no-files-found: error
          retention-days: 14

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Check out the existing Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: published
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          name: alex-public-site-${{ github.sha }}
          path: built
      - name: Publish site without replacing release appcasts
        working-directory: published
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='appcast.xml' \
            --exclude='appcast-beta.xml' \
            ../built/ ./
          git add -A
          if git diff --cached --quiet; then
            echo "Pages already matches this build"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "site: deploy ${SOURCE_SHA}"
          git push origin HEAD:gh-pages
